<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIVORGO | Admin Dashboard</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        :root {
            --sage: #4A5D45;
            --clay: #B4846C;
            --cream: #F9F7F2;
            --dark: #1a1a1a;
        }

        body {
            background-color: #382e15; /* Matching your theme */
            font-family: 'Montserrat', sans-serif;
            color: #333;
        }

        .font-serif { font-family: 'Playfair Display', serif; }

        .admin-nav {
            background-color: var(--dark);
            border-bottom: 2px solid var(--sage);
            padding: 1rem 0;
        }

        .card {
            border-radius: 15px;
            overflow: hidden;
            background-color: var(--cream);
            border: none;
        }

        .card-header {
            background-color: #fff !important;
            border-bottom: 1px solid rgba(0,0,0,0.05) !important;
        }

        .badge-pending {
            background-color: var(--clay);
            color: white;
            letter-spacing: 1px;
            font-size: 0.7rem;
        }

        /* Animation for new orders */
        .animate-fade-in {
            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .btn-refresh {
            border: 1px solid var(--sage);
            color: var(--sage);
            transition: 0.3s;
        }

        .btn-refresh:hover {
            background-color: var(--sage);
            color: white;
        }
    </style>
</head>
<body>

    <nav class="admin-nav shadow-sm mb-5">
        <div class="container d-flex justify-content-between align-items-center">
            <h3 class="text-white font-serif mb-0" style="letter-spacing: 2px;">NIVORGO ADMIN</h3>
            <button class="btn btn-refresh btn-sm text-white" onclick="fetchOrders()">🔄 REFRESH ORDERS</button>
        </div>
    </nav>

    <div class="container">
        <div class="d-flex justify-content-between align-items-end mb-4">
            <h2 class="text-white font-serif mb-0">Incoming Orders</h2>
        </div>

        <div id="admin-orders-list">
            <div class="text-center py-5 text-white">
                <div class="spinner-border text-light" role="status"></div>
                <p class="mt-2">Loading latest orders...</p>
            </div>
        </div>
    </div>

    <script>
        async function fetchOrders() {
            const container = document.getElementById('admin-orders-list');
            try {
                const res = await fetch('/api/admin/orders');
                const orders = await res.json();

                container.innerHTML = '';

                if (!orders || orders.length === 0) {
                    container.innerHTML = '<div class="alert alert-light text-center py-5 shadow-sm">No orders placed yet.</div>';
                    return;
                }

                container.innerHTML = orders.map(order => `
                    <div class="card mb-4 shadow-sm animate-fade-in" id="order-${order._id}">
                        <div class="card-header d-flex justify-content-between align-items-center py-3">
                            <div>
                                <span class="text-muted small fw-bold">ORDER ID:</span>
                                <strong class="ms-1">${order._id}</strong>
                            </div>
                            <div class="d-flex align-items-center gap-3">
                                <span class="badge badge-pending px-3 py-2 text-uppercase">${order.status}</span>
                                <button class="btn btn-danger btn-sm rounded-pill px-3" onclick="completeOrder('${order._id}')">Complete & Delete</button>
                            </div>
                        </div>
                        <div class="card-body p-4">
                            <div class="row">
                                <div class="col-md-6 border-end">
                                    <h6 class="text-uppercase small fw-bold text-muted mb-3">Customer Details</h6>
                                    <p class="mb-1"><strong>Name:</strong> ${order.userId ? order.userId.name : 'Guest User'}</p>
                                    <p class="mb-1"><strong>Email:</strong> ${order.userId ? order.userId.email : 'N/A'}</p>
                                    <p class="mb-0 text-muted small">Placed on: ${new Date(order.createdAt).toLocaleString()}</p>
                                </div>
                                <div class="col-md-6 ps-md-4">
                                    <h6 class="text-uppercase small fw-bold text-muted mb-3">Shipping Address</h6>
                                    <p class="mb-0 small">${order.shippingAddress.street}</p>
                                    <p class="mb-0 small">${order.shippingAddress.city}, ${order.shippingAddress.state}</p>
                                    <p class="mb-0 small">Zip: ${order.shippingAddress.zipCode}</p>
                                </div>
                            </div>
                            <hr class="my-4">
                            <h6 class="text-uppercase small fw-bold text-muted mb-3">Products Requested:</h6>
                            <ul class="list-group list-group-flush mb-3">
                                ${order.items.map(item => `
                                    <li class="list-group-item d-flex justify-content-between align-items-center px-0 bg-transparent border-0">
                                        <span>🌿 ${item.name}</span>
                                        <span class="fw-bold">₹${item.price}</span>
                                    </li>
                                `).join('')}
                            </ul>
                            <div class="text-end mt-3 border-top pt-3">
                                <h4 class="font-serif fw-bold" style="color: var(--sage);">Total Amount: ₹${order.totalAmount}</h4>
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                console.error("Fetch Error:", err);
                container.innerHTML = `<div class="alert alert-danger shadow border-0">Error loading orders. Please check your connection.</div>`;
            }
        }

       async function completeOrder(orderId) {
    if (!confirm("Mark this order as Completed?")) return;

    try {
        const res = await fetch(`/api/admin/orders/${orderId}`, {
            method: 'PATCH', // Use PATCH to update, not DELETE
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ status: 'Completed' })
        });

        if (res.ok) {
            alert("Order Status Updated! ✅");
            fetchOrders(); // Refresh admin list to show updated badge
        } else {
            alert("Failed to update status.");
        }
    } catch (err) {
        console.error("Error:", err);
    }
}
        fetchOrders();
    </script>
</body>
</html>
